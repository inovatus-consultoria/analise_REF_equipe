<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Controle HH</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Controle HH</h1>
          <p id="authStatus">Processamento local no navegador</p>
        </div>
        <div class="actions">
          <button id="loginButton" class="secondary" type="button" hidden>Entrar</button>
          <button id="logoutButton" class="secondary" type="button" hidden>Sair</button>
        </div>
      </header>

      <section class="panel upload-panel">
        <form id="uploadForm">
          <label for="fileInput">REF puro em Excel</label>
          <div class="upload-row">
            <input id="fileInput" type="file" accept=".xlsx,.xlsm,.xls" required />
            <button id="processButton" type="submit">Processar</button>
          </div>
        </form>
        <p id="statusText" class="status">Nenhum arquivo enviado.</p>
      </section>

      <section id="summaryPanel" class="summary-grid" hidden></section>

      <section id="downloadPanel" class="download-panel" hidden>
        <button id="downloadButton" type="button">Baixar Excel processado</button>
      </section>

      <nav id="tabs" class="tabs" hidden></nav>
      <section id="tablePanel" class="panel table-panel" hidden></section>
    </main>
  </body>
</html>
