<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Controle HH</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-redesign-4" />
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.min.js" defer></script>
    <script src="./app.js?v=20260616-redesign-4" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Controle HH</h1>
          <p id="authStatus">Processamento local no navegador</p>
        </div>
        <div class="actions">
          <span class="version-pill">Redesign v4</span>
          <button id="loginButton" class="secondary" type="button" hidden>Entrar</button>
          <button id="logoutButton" class="secondary" type="button" hidden>Sair</button>
        </div>
      </header>

      <section id="startPanel" class="start-panel">
        <div class="upload-card">
          <p class="eyebrow">Entrada</p>
          <h2>Processar REF</h2>
          <form id="uploadForm">
            <label for="fileInput">Arquivo Excel</label>
            <div class="upload-row">
              <input id="fileInput" type="file" accept=".xlsx,.xlsm,.xls" required />
              <button id="processButton" type="submit">Processar</button>
            </div>
          </form>
          <p id="statusText" class="status">Selecione um arquivo REF para começar.</p>
        </div>

        <aside class="review-card">
          <p class="eyebrow">Fluxo</p>
          <div class="review-steps">
            <div class="review-step active"><strong>1</strong><span>Selecionar REF</span></div>
            <div class="review-step"><strong>2</strong><span>Revisar alertas</span></div>
            <div class="review-step"><strong>3</strong><span>Baixar Excel</span></div>
          </div>
          <div class="privacy-note"><span aria-hidden="true">🔒</span>Arquivo processado no navegador.</div>
        </aside>
      </section>

      <section id="resultHeader" class="result-header" hidden>
        <div>
          <p class="eyebrow">Resultado</p>
          <h2 id="resultTitle">Processamento concluido</h2>
          <p id="resultMeta"></p>
        </div>
        <button id="downloadButton" type="button">Baixar Excel</button>
      </section>

      <nav id="tabs" class="tabs" hidden></nav>
      <section id="viewPanel" class="view-panel" hidden></section>
    </main>
  </body>
</html>
